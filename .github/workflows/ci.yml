name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    - name: Lint with flake8
      run: |
        echo "Listing all files in workspace:"
        find . -maxdepth 2 -not -path '*/.*'
        
        echo "Running flake8 with full diagnostics..."
        # This will show every error and warning found in the whole project
        python3 -m flake8 . ttt --builtins="_" --select=E9,F63,F7,F82 --show-source --statistics --exit-zero
        
        # Final pass that actually fails the build
        echo "Final pass (will fail if error exists):"
        python3 -m flake8 . ttt --count --builtins="_" --select=E9,F63,F7,F82 --statistics

  build-deb:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y debhelper devscripts build-essential dh-python
    - name: Check Debian package build
      run: |
        # debian/rules must be run from the root directory, not from within debian/
        chmod +x debian/rules
        ./debian/rules clean
