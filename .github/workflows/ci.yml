name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    - name: Lint with flake8
      run: |
        # Explicitly lint known Python files to pinpoint failure
        flake8 ncam.py --count --builtins="_" --select=E9,F63,F7,F82 --show-source --statistics
        flake8 pref_edit.py --count --builtins="_" --select=E9,F63,F7,F82 --show-source --statistics
        flake8 restore_lcnc.py --count --builtins="_" --select=E9,F63,F7,F82 --show-source --statistics
        flake8 ttt --count --builtins="_" --select=E9,F63,F7,F82 --show-source --statistics

  build-deb:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y debhelper devscripts build-essential dh-python
    - name: Check Debian package build
      run: |
        # debian/rules must be run from the root directory, not from within debian/
        chmod +x debian/rules
        ./debian/rules clean
