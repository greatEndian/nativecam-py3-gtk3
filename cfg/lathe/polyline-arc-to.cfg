[SUBROUTINE]
version = 1.14
icon = arc-to-coords.png
name = _("Arc To Coords")
type = poly_arc_to_coords
help = _("<b>Add an arc to a polyline</b>&#10;Define destination, dir and arc height or radius")
order = act h1 type x z h2 atype height rev dir

[PARAM_ACT]
name = _("Active")
icon = enable.png
type = bool
value = 1

[PARAM_H1]
name = _("Arc end coords")
type = sub-header
tool_tip = _("Relative or absolute position")

[PARAM_X]
name = _("X (Diameter)")
header = h1
type = float
icon = x.png
tool_tip = _("Destination X")
value = 1
metric_value = 25

[PARAM_Z]
name = _("Z")
header = h1
type = float
icon = z.png
tool_tip = _("Destination Z")
value = -1
metric_value = -25

[PARAM_TYPE]
name = _("Option")
header = h1
type = combo
options = _("Relative=4:Absolute=5:Z relative, X absolute=41:Z absolute, X relative=42")
tool_tip = _("Select Relative or Absolute")
value = 4
icon = line-rel.png

[PARAM_H2]
name = _("Definition")
type = sub-header
tool_tip = _("Define arc")

[PARAM_ATYPE]
name = _("Option")
header = h2
type = combo
options = _("Radius=0:Arc height=1")
value = 0
tool_tip = _("Select value defined")
icon = rad-arc-opt.png

[PARAM_HEIGHT]
name = _("Size")
type = float
header = h2
value = 1
icon = line-len.png
metric_value = 25
minimum_value = 0
not_allowed = 0

[PARAM_DIR]
name = _("Direction")
header = h2
type = combo
options = _("Clockwise=2:Counter-Clockwise=3")
icon = cw-ccw.png
tool_tip = _("Direction of path")
value = 2

[PARAM_REV]
name = _("Flip center")
type = bool
icon = swap-side.png
header = h2
value = 0
tool_tip = _("Center opposite side of chord")

[CALL]
content =
	(begin #sub_name)
	
	o<#self_id_active> if [#param_act AND #<in_polyline>]
		#<z_val> = [#param_z]
		#<x_val> = [#param_x / #<_diameter_mode>]
		
		o<#self_id_type> if [#param_type EQ 41]
		   (Z relative, X absolute)
		   o<poly_add_item> CALL [41] [#<z_val>] [#<x_val>] [#param_dir] [0] [0] [0] [1] [#param_height] [#param_atype] [#param_rev]
		o<#self_id_type> elseif [#param_type EQ 42]
		   (Z absolute, X relative)
		   o<poly_add_item> CALL [42] [#<z_val>] [#<x_val>] [#param_dir] [0] [0] [0] [1] [#param_height] [#param_atype] [#param_rev]
		o<#self_id_type> else
		   o<poly_add_item> CALL [#param_type] [#<z_val>] [#<x_val>] [#param_dir] [0] [0] [0] [1] [#param_height] [#param_atype] [#param_rev]
		o<#self_id_type> endif
		
	o<#self_id_active> endif
	(end #sub_name)
