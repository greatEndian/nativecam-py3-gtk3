[SUBROUTINE]
icon = face.png
name = Face Mill (G17)
type = face_mill
help = Face milling operation on the lathe face using live tooling.
order = x y z depth dia feed tool

[PARAM_X]
name = X Start (Diam)
type = float
icon = x.png
tool_tip = X starting coordinate (Lathe Diameter)
value = 0.0

[PARAM_Y]
name = Y Start
type = float
icon = y.png
tool_tip = Y starting coordinate (If machine has Y axis)
value = 0.0

[PARAM_Z]
name = Z Surface
type = float
icon = z.png
tool_tip = Z surface coordinate (Depth reference)
value = 0.0

[PARAM_DEPTH]
name = Cut Depth
type = float
icon = depth.png
tool_tip = Total depth of cut into the face
value = -1.0

[PARAM_DIA]
name = Pocket Diameter
type = float
icon = diameter.png
tool_tip = Diameter of the milled pocket
value = 0.5

[PARAM_FEED]
name = Feed Rate
type = float
icon = tool-feed.png
tool_tip = Milling feed rate
value = 15.0

[PARAM_TOOL]
name = Live Tool
type = tool
icon = tool.png
tool_tip = Select a live milling tool

[CALL]
content =
    ; --- 1. Turn-Mill Plane Transition & Safety Guard ---
    <eval> 'G40\nM5\nM3 $1\nG17' if TOOL_TABLE.is_live_tool(get_int(self.get_param('tool').get_value())) else '(Warning: Selected tool is not marked as live/mill)' </eval>
    
    ; --- 2. Coordinate Mapping ---
    ; Face Milling (G17): Lathe Z is Depth, Lathe X is Mill X, Lathe Y is Mill Y.
    ; We use <eval> to halve the X diameter input so the milling subroutine receives a standard radius.
    #<mill_x> = <eval> get_float(self.get_param('x').get_value()) / 2.0 </eval>
    #<mill_y> = #param_y
    #<mill_z> = #param_z
    
    ; --- 3. Execute Milling Toolpath ---
    ; Calling a theoretical circle pocket sub expecting: [X] [Y] [Z] [Depth] [Diameter] [Feed]
    o<circle_pocket> call [#<mill_x>] [#<mill_y>] [#<mill_z>] [#param_depth] [#param_dia] [#param_feed]
    
    ; --- 4. Safe Retract & Restore Lathe Plane ---
    <eval> 'G18' if TOOL_TABLE.is_live_tool(get_int(self.get_param('tool').get_value())) else '' </eval>