[EMC]
MACHINE = Turn-Mill-Headless-Test
VERSION = 1.1

[DISPLAY]
DISPLAY = dummy
PROGRAM_PREFIX = .

[RS274NGC]
RS274NGC_STARTUP_CODE = G18 G20 G40 G49 G54 G80 G90 G94
SUBROUTINE_PATH = ../lib/lathe:../lib/utilities:../lib/mill

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD  = 100000
SERVO_PERIOD = 1000000

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[HAL]
HALUI = halui

[TRAJ]
COORDINATES = X Y Z C
LINEAR_UNITS = inch
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 1.0
MAX_LINEAR_VELOCITY = 10.0

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = dummy.tbl

[KINS]
JOINTS = 4
KINEMATICS = trivkins coordinates=XYZC

[AXIS_X]
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0
MAX_VELOCITY = 10.0
MAX_ACCELERATION = 30.0

[JOINT_0]
TYPE = LINEAR
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0
MAX_VELOCITY = 10.0
MAX_ACCELERATION = 30.0

[AXIS_Y]
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0
MAX_VELOCITY = 10.0
MAX_ACCELERATION = 30.0

[JOINT_1]
TYPE = LINEAR
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0
MAX_VELOCITY = 10.0
MAX_ACCELERATION = 30.0

[AXIS_Z]
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0
MAX_VELOCITY = 10.0
MAX_ACCELERATION = 30.0

[JOINT_2]
TYPE = LINEAR
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0
MAX_VELOCITY = 10.0
MAX_ACCELERATION = 30.0

[AXIS_C]
MIN_LIMIT = -36000.0
MAX_LIMIT = 36000.0
MAX_VELOCITY = 90.0
MAX_ACCELERATION = 120.0

[JOINT_3]
TYPE = ANGULAR
MIN_LIMIT = -36000.0
MAX_LIMIT = 36000.0
MAX_VELOCITY = 90.0
MAX_ACCELERATION = 120.0