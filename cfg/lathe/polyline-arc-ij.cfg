[SUBROUTINE]
version = 1.14
icon = arc-to-ij.png
name = _("Arc I,K")
type = poly_arc_IJ
help = _("<b>Add an arc to a polyline</b>&#10;Define I and K offsets or absolute center")
order = act h1 type i k h2 a etype dir

[PARAM_ACT]
name = _("Active")
icon = enable.png
type = bool
value = 1

[PARAM_H1]
name = _("Arc center")
type = sub-header

[PARAM_TYPE]
name = _("Position")
header = h1
type = combo
options = _("Offsets=6:Absolute=7:K offset, X absolute=61:K absolute, X offset=62")
tool_tip = _("Arc center option")
value = 6
icon = line-rel.png

[PARAM_I]
type = float
name = _("I (X offset or center)")
icon = i.png
value = 0
metric_value = 0
header = h1
tool_tip = _("X offset (radius) or absolute diameter center")

[PARAM_K]
type = float
name = _("K (Z offset or center)")
icon = k.png
value = -0.5
metric_value = -12
header = h1
tool_tip = _("Z offset or absolute Z center")

[PARAM_A]
name = _("Angle")
header = h2
type = float
icon = angle.png
digits = 2
tool_tip = _("Angle where it ends")
value = 90
suffix = &#176;

[PARAM_DIR]
name = _("Direction")
header = h2
type = combo
options = _("Clockwise=2:Counter-Clockwise=3")
icon = cw-ccw.png
tool_tip = _("Direction of path")
value = 3

[PARAM_H2]
name = _("Ending")
type = sub-header

[PARAM_ETYPE]
name = _("Angle option")
header = h2
type = combo
options = _("Relative to start=0:Absolute to arc center=1")
tool_tip = _("Angle relative to beginning of arc or absolute")
value = 0
icon = line-rel.png

[CALL]
content =
	(begin #sub_name)
	
	o<#self_id_active> if [#param_act AND #<in_polyline>]
		#<z_val> = [#param_k]
		#<x_val> = [#param_i]
		
		o<#self_id_type> if [#param_type EQ 7] (Absolute)
			#<x_val> = [#param_i / #<_diameter_mode>]
		o<#self_id_type> elseif [#param_type EQ 61] (K offset, X absolute)
			#<x_val> = [#param_i / #<_diameter_mode>]
		o<#self_id_type> endif
		
		o<poly_add_item> CALL [#param_type] [#<z_val>] [#<x_val>] [#param_dir] [0] [0] [0] [1] [#param_a] [#param_etype]
		
	o<#self_id_active> endif
	(end #sub_name)
