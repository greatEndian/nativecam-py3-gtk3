[SUBROUTINE]
version = 1.14
icon = line-polar.png
name = _("Line Polar")
type = poly-line-polar
help = _("<b>Trace a line to a polar position</b>&#10;Relative to previous or absolute")
order = act h1 a type l

[PARAM_ACT]
name = _("Active")
icon = enable.png
type = bool
value = 1

[PARAM_H1]
type = sub-header
name = _("Definition")

[PARAM_L]
name = _("Length")
header = h1
type = float
minimum_value = 0.0
icon = line-len.png
tool_tip = _("Length of line")
value = 1
metric_value = 25
not_allowed = 0

[PARAM_A]
name = _("Angle")
header = h1
type = float
icon = angle.png
digits = 2
tool_tip = _("Angle relative to Z axis (0deg is along Z+)")
value = 45
suffix = &#176;

[PARAM_TYPE]
name = _("Angle option")
header = h1
type = combo
options = _("Absolute=2:Relative to previous line or chord=3:Relative to previous arc center=30")
icon = line-rel.png
tool_tip = _("Angle relative to previous line or absolute")
value = 2

[CALL]
content =
	(begin #sub_name)
	
	o<#self_id_active> if [#param_act AND #<in_polyline>]
		o<poly_add_item> CALL [#param_type] [#param_l * COS[#param_a]] [#param_l * SIN[#param_a]] [1] [0] [0] [0] [1]
		
	o<#self_id_active> endif
	(end #sub_name)
