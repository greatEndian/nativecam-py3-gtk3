[SUBROUTINE]
icon = slot.png
name = Face Slot (G17)
type = face_slot
help = Face slotting operation on the lathe face using live tooling.
order = x y z depth length width angle feed tool

[PARAM_X]
name = X Start (Diam)
type = float
icon = x.png
tool_tip = X starting coordinate (Lathe Diameter)
value = 0.0

[PARAM_Y]
name = Y Start
type = float
icon = y.png
tool_tip = Y starting coordinate (If machine has Y axis)
value = 0.0

[PARAM_Z]
name = Z Surface
type = float
icon = z.png
tool_tip = Z surface coordinate (Depth reference)
value = 0.0

[PARAM_DEPTH]
name = Cut Depth
type = float
icon = depth.png
tool_tip = Total depth of cut into the face
value = -0.25

[PARAM_LENGTH]
name = Slot Length
type = float
icon = dx.png
tool_tip = Length of the slot
value = 2.0

[PARAM_WIDTH]
name = Slot Width
type = float
icon = dy.png
tool_tip = Width of the slot
value = 0.5

[PARAM_ANGLE]
name = Angle
type = float
icon = angle.png
tool_tip = Rotation angle of the slot
value = 0.0

[PARAM_FEED]
name = Feed Rate
type = float
icon = tool-feed.png
tool_tip = Milling feed rate
value = 15.0

[PARAM_TOOL]
name = Live Tool
type = tool
icon = tool.png
tool_tip = Select a live milling tool

[CALL]
content =
    ; --- 1. Turn-Mill Plane Transition & Safety Guard ---
    <eval> 'G40\nM5\nM3 $1\nG17' if TOOL_TABLE.is_live_tool(get_int(self.get_param('tool').get_value())) else '(Warning: Selected tool is not marked as live/mill)' </eval>
    
    ; --- 2. Coordinate Mapping ---
    ; Face Slotting (G17): Divide Lathe X Diam to Mill X Radius
    #<mill_x> = <eval> get_float(self.get_param('x').get_value()) / 2.0 </eval>
    #<mill_y> = #param_y
    #<mill_z> = #param_z
    
    ; --- 3. Execute Milling Toolpath ---
    ; Call a standard slot O-word subroutine
    o<slot> call [#<mill_x>] [#<mill_y>] [#<mill_z>] [#param_depth] [#param_length] [#param_width] [#param_angle] [#param_feed]
    
    ; --- 4. Safe Retract & Restore Lathe Plane ---
    <eval> 'G18' if TOOL_TABLE.is_live_tool(get_int(self.get_param('tool').get_value())) else '' </eval>