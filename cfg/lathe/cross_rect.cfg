[SUBROUTINE]
icon = rect.png
name = Cross Rectangle (G19)
type = cross_rect
help = Cross rectangle milling operation on the lathe OD using live tooling.
order = x_surf y z depth width height radius angle feed tool

[PARAM_X_SURF]
name = X Surface (OD)
type = float
icon = x.png
tool_tip = Outside diameter of the part (Lathe X)
value = 2.0

[PARAM_Y]
name = Y Start
type = float
icon = y.png
tool_tip = Y center coordinate (Cross axis)
value = 0.0

[PARAM_Z]
name = Z Start
type = float
icon = z.png
tool_tip = Z center coordinate (Length axis)
value = 0.0

[PARAM_DEPTH]
name = Radial Depth
type = float
icon = depth.png
tool_tip = Radial depth of cut into the OD
value = -0.1

[PARAM_WIDTH]
name = Width (Cross)
type = float
icon = dx.png
tool_tip = Width of the rectangle (Y axis mapped)
value = 2.0

[PARAM_HEIGHT]
name = Height (Length)
type = float
icon = dy.png
tool_tip = Height of the rectangle (Z axis mapped)
value = 1.0

[PARAM_RADIUS]
name = Corner Radius
type = float
icon = corner-radius.png
tool_tip = Radius of the corners
value = 0.0

[PARAM_ANGLE]
name = Angle
type = float
icon = angle.png
tool_tip = Rotation angle
value = 0.0

[PARAM_FEED]
name = Feed Rate
type = float
icon = tool-feed.png
tool_tip = Milling feed rate
value = 15.0

[PARAM_TOOL]
name = Live Tool
type = tool
icon = tool.png
tool_tip = Select a live milling tool

[CALL]
content =
    ; --- 1. Turn-Mill Plane Transition & Safety Guard ---
    <eval> 'G40\nM5\nM3 $1\nG19' if TOOL_TABLE.is_live_tool(get_int(self.get_param('tool').get_value())) else '(Warning: Selected tool is not marked as live/mill)' </eval>
    
    ; --- 2. Coordinate Mapping ---
    ; Cross Milling (G19): Lathe Y is Mill X, Lathe Z is Mill Y, Lathe X is Mill Z (Depth).
    ; We halve the Lathe X OD to get the correct standard Cartesian radius for Mill Z.
    #<mill_x> = #param_y
    #<mill_y> = #param_z
    #<mill_z> = <eval> get_float(self.get_param('x_surf').get_value()) / 2.0 </eval>
    
    ; --- 3. Execute Milling Toolpath ---
    ; Call our shared rectangle sub expecting: [X] [Y] [Z] [Depth] [Width] [Height] [Radius] [Angle] [Feed]
    o<rectangle> call [#<mill_x>] [#<mill_y>] [#<mill_z>] [#param_depth] [#param_width] [#param_height] [#param_radius] [#param_angle] [#param_feed]
    
    ; --- 4. Safe Retract & Restore Lathe Plane ---
    <eval> 'G18' if TOOL_TABLE.is_live_tool(get_int(self.get_param('tool').get_value())) else '' </eval>