[SUBROUTINE]
icon = polygon.png
name = Cross Polygon (G19)
type = cross_polygon
help = Cross polygon milling operation on the lathe OD using live tooling.
order = x_surf y z depth radius edges angle feed tool

[PARAM_X_SURF]
name = X Surface (OD)
type = float
icon = x.png
tool_tip = Outside diameter of the part (Lathe X)
value = 2.0

[PARAM_Y]
name = Y Start
type = float
icon = y.png
tool_tip = Y center coordinate (Cross axis)
value = 0.0

[PARAM_Z]
name = Z Start
type = float
icon = z.png
tool_tip = Z center coordinate (Length axis)
value = 0.0

[PARAM_DEPTH]
name = Radial Depth
type = float
icon = depth.png
tool_tip = Radial depth of cut into the OD
value = -0.1

[PARAM_RADIUS]
name = Polygon Radius
type = float
icon = radius.png
tool_tip = Radius of the polygon (circumscribed)
value = 1.0

[PARAM_EDGES]
name = Number of Edges
type = int
icon = items.png
tool_tip = Number of polygon edges (e.g., 6 for Hexagon)
value = 6

[PARAM_ANGLE]
name = Angle
type = float
icon = angle.png
tool_tip = Rotation angle
value = 0.0

[PARAM_FEED]
name = Feed Rate
type = float
icon = tool-feed.png
tool_tip = Milling feed rate
value = 15.0

[PARAM_TOOL]
name = Live Tool
type = tool
icon = tool.png
tool_tip = Select a live milling tool

[CALL]
content =
    <eval> 'G40\nM5\nM3 $1\nG19' if TOOL_TABLE.is_live_tool(get_int(self.get_param('tool').get_value())) else '(Warning: Selected tool is not marked as live/mill)' </eval>
    #<mill_x> = #param_y
    #<mill_y> = #param_z
    #<mill_z> = <eval> get_float(self.get_param('x_surf').get_value()) / 2.0 </eval>
    o<polygon> call [#<mill_x>] [#<mill_y>] [#<mill_z>] [#param_depth] [#param_radius] [#param_edges] [#param_angle] [#param_feed]
    <eval> 'G18' if TOOL_TABLE.is_live_tool(get_int(self.get_param('tool').get_value())) else '' </eval>